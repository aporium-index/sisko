<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADAMA dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 1100px; margin: 0 auto; padding: 24px; background: #0d1117; color: #c9d1d9; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
  a { color: #58a6ff; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; color: #8b949e; font-weight: 500; font-size: 12px; text-transform: uppercase; }
  td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
  .row-clickable { cursor: pointer; }
  .row-clickable:hover { background: #161b22; }
  .focus { color: #8b949e; font-size: 13px; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-blue { background: #1f6feb33; color: #58a6ff; }
  .badge-green { background: #23863633; color: #3fb950; }
  .badge-yellow { background: #9e6a0333; color: #d2991d; }
  .badge-red { background: #da363333; color: #f85149; }
  .badge-gray { background: #30363d; color: #8b949e; }
  .badge-purple { background: #a371f733; color: #a371f7; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .dot-green { background: #3fb950; }
  .dot-yellow { background: #d2991d; }
  .dot-red { background: #f85149; }
  .dot-gray { background: #6b7280; }
  .stale { color: #d2991d; cursor: help; }
  .stats { display: flex; gap: 24px; margin: 24px 0; flex-wrap: wrap; }
  .stat { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 12px 16px; min-width: 100px; }
  .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
  .stat-value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .section-title { font-size: 16px; margin: 28px 0 12px; color: #f0f6fc; }
  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #21262d; color: #484f58; font-size: 12px; }
  .loading { padding: 40px; text-align: center; color: #8b949e; }
  .error { color: #f85149; padding: 20px; }
  .detail-row { background: #161b22; border-bottom: 1px solid #21262d; }
  .detail-content { padding: 16px 24px; max-width: 100%; overflow-x: auto; }
  .detail-content h2 { font-size: 15px; color: #f0f6fc; margin-bottom: 12px; border-bottom: 1px solid #21262d; padding-bottom: 6px; }
  .detail-content h3 { font-size: 13px; color: #8b949e; margin: 12px 0 4px; }
  .detail-content p, .detail-content li { font-size: 13px; line-height: 1.5; margin: 4px 0; }
  .detail-content ul { padding-left: 20px; }
  .detail-content table { margin: 8px 0; }
  .detail-content table td, .detail-content table th { padding: 4px 8px; font-size: 12px; }
  .detail-content pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
  .detail-content hr { border: none; border-top: 1px solid #21262d; margin: 12px 0; }
  .detail-content a { color: #58a6ff; }
  .detail-content code { background: #0d1117; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .detail-content blockquote { border-left: 2px solid #30363d; padding-left: 12px; color: #8b949e; margin: 8px 0; }
  .checkbox { color: #8b949e; }
  .checkbox-checked { color: #3fb950; }
</style>
</head>
<body>
<h1>ADAMA dashboard</h1>
<p class="subtitle">Live &mdash; reads outpost state files on every load. Click a row to expand.</p>

<div class="stats" id="stats"></div>
<div class="section-title">All Outposts</div>
<div id="table-container"><p class="loading">loading outposts&hellip;</p></div>
<p class="footer">ADAMA control plane &middot; <code>Serve Dashboard.command</code></p>

<script>
var OUTPOSTS_DIR = 'outposts';

var STATE_BADGES = {
  operational: '<span class="badge badge-blue">operational</span>',
  dormant: '<span class="badge badge-gray">dormant</span>',
  commissioning: '<span class="badge badge-purple">commissioning</span>',
  transiting: '<span class="badge badge-yellow">transiting</span>',
  decommissioned: '<span class="badge badge-gray">decommissioned</span>',
  destroyed: '<span class="badge badge-red">destroyed</span>'
};

var CONDITION_DOTS = {
  'condition-green': '<span class="dot dot-green"></span> condition-green',
  'yellow-alert': '<span class="dot dot-yellow"></span> yellow-alert',
  'red-alert': '<span class="dot dot-red"></span> red-alert',
  adrift: '<span class="dot dot-gray"></span> adrift'
};

var expandedSlug = null;
var allOutposts = [];

function parseFrontmatter(text) {
  var m = text.match(/^---\s*\n(.*?)\n---/s);
  if (!m) return {};
  var data = {};
  var lines = m[1].split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var colon = line.indexOf(':');
    if (colon === -1 || line.trim().indexOf('#') === 0) continue;
    var key = line.slice(0, colon).trim();
    var val = line.slice(colon + 1).trim();
    if (val.indexOf('[') === 0 && val.lastIndexOf(']') === val.length - 1) {
      val = val.slice(1, -1).split(',').map(function(v) { return v.trim().replace(/['"]/g, ''); }).filter(Boolean);
    } else if (val === 'true') val = true;
    else if (val === 'false') val = false;
    else if (val === 'null') val = null;
    else val = val.replace(/^['"]|['"]$/g, '');
    data[key] = val;
  }
  return data;
}

function firstBodyLine(text) {
  var parts = text.split(/^---$/m);
  if (parts.length < 3) return '\u2014';
  var body = parts.slice(2).join('---').trim();
  var lines = body.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var s = lines[i].trim();
    if (s && s.indexOf('#') !== 0) return s.slice(0, 140);
  }
  return '\u2014';
}

function getBodyWithoutFrontmatter(text) {
  var parts = text.split(/^---$/m);
  if (parts.length < 3) return text;
  return parts.slice(2).join('---').trim();
}

function daysAgo(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr + 'T00:00:00');
  var now = new Date();
  return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

function conditionHtml(condition, state) {
  if (state !== 'operational') return '\u2014';
  return CONDITION_DOTS[condition] || condition || '\u2014';
}

function staleIndicator(staleDays, threshold) {
  if (staleDays === null) return '';
  if (staleDays > threshold) return ' <span class="stale" title="Stale: ' + staleDays + ' days">\u26A0</span>';
  return '';
}

function markdownToHtml(md) {
  var html = md;
  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Checkboxes
  html = html.replace(/<li>\[x\] (.+?)<\/li>/g, '<li><span class="checkbox-checked">\u2611</span> $1</li>');
  html = html.replace(/<li>\[ \] (.+?)<\/li>/g, '<li><span class="checkbox">\u2610</span> $1</li>');
  // Tables
  html = html.replace(/^\|(.+)\|$/gm, function(match) {
    var cells = match.slice(1, -1).split('|');
    var row = '';
    for (var i = 0; i < cells.length; i++) {
      row += '<td>' + cells[i].trim() + '</td>';
    }
    return '<tr>' + row + '</tr>';
  });
  html = html.replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>');
  // Links
  html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Line breaks
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

async function discoverSlugs() {
  var slugs = [];
  var resp = await fetch(OUTPOSTS_DIR + '/');
  if (!resp.ok) return slugs;
  var html = await resp.text();
  var re = /href="([^"]+-state\.md)"/g;
  var m;
  while ((m = re.exec(html)) !== null) {
    slugs.push(m[1].replace('-state.md', ''));
  }
  return slugs;
}

async function loadOutpost(slug) {
  var resp = await fetch(OUTPOSTS_DIR + '/' + slug + '-state.md');
  if (!resp.ok) return null;
  var text = await resp.text();
  var data = parseFrontmatter(text);
  data._slug = slug;
  data._rawBody = getBodyWithoutFrontmatter(text);
  data._bodyHtml = markdownToHtml(data._rawBody);
  data._focus = firstBodyLine(text);
  data._staleDays = daysAgo(data.last_active);
  return data;
}

function renderDetail(slug) {
  var container = document.getElementById('detail-' + slug);
  if (!container) return;

  if (container.innerHTML) {
    container.innerHTML = '';
    expandedSlug = null;
    return;
  }

  for (var i = 0; i < allOutposts.length; i++) {
    if (allOutposts[i]._slug === slug) {
      container.innerHTML = '<div class="detail-content">' + allOutposts[i]._bodyHtml + '</div>';
      break;
    }
  }

  // Collapse others
  var details = document.querySelectorAll('[id^="detail-"]');
  for (var j = 0; j < details.length; j++) {
    if (details[j].id !== 'detail-' + slug) details[j].innerHTML = '';
  }
  expandedSlug = slug;
}

function renderAll(outposts) {
  allOutposts = outposts;

  var green = 0, yellow = 0, red = 0, adrift = 0;
  var operational = 0, dormant = 0;
  var agents = 0, gitignore = 0;

  var rows = [];
  for (var i = 0; i < outposts.length; i++) {
    var o = outposts[i];
    var state = o.state || 'unknown';
    var condition = o.condition;
    var priority = o.priority || '\u2014';
    var tier = o.criticality || '\u2014';
    var lastActive = o.last_active || '\u2014';
    var threshold = parseInt(o.stale_threshold_days) || 14;
    var staleHtml = staleIndicator(o._staleDays, threshold);
    var condHtml = conditionHtml(condition, state);
    var slug = o._slug;

    if (state === 'operational') operational++;
    if (state === 'dormant') dormant++;
    if (condition === 'condition-green') green++;
    if (condition === 'yellow-alert') yellow++;
    if (condition === 'red-alert') red++;
    if (condition === 'adrift') adrift++;
    if (o.has_agents_md) agents++;
    if (o.has_gitignore) gitignore++;

    rows.push(
      '<tr class="row-clickable" onclick="renderDetail(\'' + slug + '\')">' +
      '<td>' + (o.name || slug) + ' <span style="color:#484f58;font-size:11px">&#9654;</span></td>' +
      '<td>' + (STATE_BADGES[state] || state) + '</td>' +
      '<td>' + condHtml + '</td>' +
      '<td>' + priority + '</td>' +
      '<td>' + tier + '</td>' +
      '<td>' + lastActive + staleHtml + '</td>' +
      '<td class="focus">' + o._focus + '</td>' +
      '</tr>' +
      '<tr class="detail-row"><td colspan="7" id="detail-' + slug + '"></td></tr>'
    );
  }

  document.getElementById('table-container').innerHTML = '<table>' +
    '<thead><tr><th>Outpost</th><th>State</th><th>Condition</th><th>Priority</th><th>Tier</th><th>Active</th><th>Focus</th></tr></thead>' +
    '<tbody>' + rows.join('') + '</tbody>' +
    '</table>';

  var total = outposts.length;
  var compliance = agents + gitignore;

  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-label">Outposts</div><div class="stat-value">' + total + '</div></div>' +
    '<div class="stat"><div class="stat-label">Operational</div><div class="stat-value" style="color:#3fb950">' + operational + '</div></div>' +
    '<div class="stat"><div class="stat-label">Dormant</div><div class="stat-value" style="color:#8b949e">' + dormant + '</div></div>' +
    '<div class="stat"><div class="stat-label">Compliance</div><div class="stat-value">' + compliance + '/' + (total * 2) + '</div></div>' +
    '<div class="stat"><div class="stat-label">Green</div><div class="stat-value" style="color:#3fb950">' + green + '</div></div>' +
    '<div class="stat"><div class="stat-label">Alerts</div><div class="stat-value" style="color:#d2991d">' + yellow + '</div></div>';
}

async function loadAll() {
  var slugs = await discoverSlugs();
  if (!slugs.length) {
    slugs = ['ADAMA', '_aporium', 'basicly', 'jamboree', 'quotaz',
             'prosodymaker', 'mac-optimization-audit', 'ml-feedback-program'];
  }

  var outposts = [];
  for (var i = 0; i < slugs.length; i++) {
    var data = await loadOutpost(slugs[i]);
    if (data) outposts.push(data);
  }

  if (!outposts.length) {
    document.getElementById('table-container').innerHTML =
      '<p class="error">No outposts loaded. Is the server running?</p>';
    return;
  }

  var tierOrder = { 'tier-0': 0, 'tier-1': 1, 'tier-2': 2, 'tier-3': 3 };
  var priOrder = { P1: 0, P2: 1, P3: 2, P4: 3 };
  var stateOrder = { operational: 0, transiting: 1, commissioning: 2, dormant: 3, decommissioned: 4, destroyed: 5 };

  outposts.sort(function(a, b) {
    return (tierOrder[a.criticality] || 99) - (tierOrder[b.criticality] || 99) ||
           (priOrder[a.priority] || 99) - (priOrder[b.priority] || 99) ||
           (stateOrder[a.state] || 99) - (stateOrder[b.state] || 99) ||
           (a.name || a._slug).localeCompare(b.name || b._slug);
  });

  renderAll(outposts);
}

loadAll().catch(function(err) {
  document.getElementById('table-container').innerHTML =
    '<p class="error">Failed to load: ' + err.message + '</p>';
});
</script>
</body>
</html>
